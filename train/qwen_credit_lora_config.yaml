# The path to the local model directory or Hugging Face repo.
model: "mlx-community/Qwen3-0.6B-bf16"

# Directory with {train, valid, test}.jsonl files
data: "/Users/ljoana/repos/wine_variety_classification/train/credit_data"

# The PRNG seed
seed: 123

fine_tune_type: lora

# Number of layers to fine-tune
num_layers: -1

# Minibatch size.
batch_size: 8

# Iterations to train for.
iters: 2000

# Number of validation batches, -1 uses the entire validation set.
val_batches: 20

# Adam learning rate.
learning_rate: 1e-5

# Number of training steps between loss reporting.
steps_per_report: 10

# Number of training steps between validations.
steps_per_eval: 100

# Save/load path for the trained adapter weights.
adapter_path: "adapters/credit-qwen"

# Save the model every N iterations.
save_every: 100

# Evaluate on the test set after training
test: false

# Number of test set batches, -1 uses the entire test set.
test_batches: 100

# Maximum sequence length.
max_seq_length: 768

# Use gradient checkpointing to reduce memory use.
grad_checkpoint: false

optimizer_config:
  adamw:
    betas: [0.9, 0.98]
    eps: 1e-6
    weight_decay: 0.05
    bias_correction: true

lora_parameters:
  keys: ["self_attn.k_proj", "self_attn.v_proj", "self_attn.q_proj", "self_attn.o_proj", "mlp.gate_proj", "mlp.down_proj", "mlp.up_proj"]
  rank: 32
  scale: 2
  dropout: 0

lr_schedule:
  name: cosine_decay
  warmup: 100
  warmup_init: 1e-4
  arguments: [4e-4, 400, 1e-4]

wandb: "mlx-credit-default"

monitor_enabled: false
monitor_initial_validation: false
monitor_batch_size: 1
monitor_sample_size: 5
monitor_max_tokens: 8
